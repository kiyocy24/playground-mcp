# NOTE: このファイルは .github/workflows/deploy.yml として配置するワークフローです。
# PR 作成に使用したトークンに workflow スコープがなく .github/workflows/ 配下へ
# 直接 push できなかったため、一時的にこのパスに置いています。
# マージ後(またはマージ前にこのブランチ上で)以下を実行してください:
#
#   git mv .github/deploy-workflow.yml .github/workflows/deploy.yml
#
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGION: asia-northeast1
  SERVICE: playground-mcp
  # <region>-docker.pkg.dev/<project>/<artifact registry リポジトリ>/<サービス名>
  IMAGE: asia-northeast1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/playground-mcp/playground-mcp

# デプロイの並走を防ぐ(後続の push は先行の完了を待つ)
concurrency:
  group: deploy-cloud-run
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    # OIDC トークンの発行に id-token: write が必要
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v5

      - name: Authenticate to Google Cloud (OIDC)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # GitHub Actions のキャッシュ(type=gha)でビルドを高速化する
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}:${{ github.sha }}

      - name: Show deployed URL
        run: echo "Deployed to ${{ steps.deploy.outputs.url }}"
